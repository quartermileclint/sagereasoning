<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageReasoning Flow Tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #0a0e17;
            color: #e4e9f1;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            background: #131a2b;
            border-bottom: 1px solid #1a2340;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .title-section {
            flex: 1;
            min-width: 300px;
        }

        .title-section h1 {
            font-size: 24px;
            font-weight: 600;
            color: #d4a843;
            margin-bottom: 4px;
        }

        .title-section p {
            font-size: 13px;
            color: #8b92a0;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 8px 12px;
            background: #1a2340;
            border: 1px solid #2d3a52;
            color: #e4e9f1;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        select:hover, button:hover {
            background: #252e42;
            border-color: #3d4a62;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #d4a843;
            box-shadow: 0 0 0 2px rgba(212, 168, 67, 0.1);
        }

        .control-label {
            font-size: 13px;
            color: #8b92a0;
        }

        .toggle-btn {
            padding: 8px 12px;
            background: #1a2340;
            border: 1px solid #2d3a52;
            color: #e4e9f1;
        }

        .toggle-btn.active {
            background: #d4a843;
            color: #0a0e17;
            border-color: #d4a843;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 16px;
            padding: 16px;
        }

        .canvas-wrapper {
            flex: 1;
            background: #0a0e17;
            border: 1px solid #1a2340;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            position: relative;
        }

        #canvas.dragging {
            cursor: grabbing;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .nodes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .node {
            position: absolute;
            padding: 8px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
        }

        .node.brain-derived {
            border: 2px solid #a78bfa;
        }

        .node.wrapped {
            border: 2px solid #f472b6;
        }

        .node.dimmed {
            opacity: 0.2;
        }

        .node.active {
            opacity: 1;
            box-shadow: 0 0 15px rgba(212, 168, 67, 0.6), 0 0 0 2px rgba(212, 168, 67, 0.3);
        }

        .node-step {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 24px;
            height: 24px;
            background: #d4a843;
            color: #0a0e17;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node.active .node-step {
            opacity: 1;
        }

        /* Category colors */
        .category-product { background: #60a5fa; color: #0a0e17; }
        .category-tool { background: #f472b6; color: #0a0e17; }
        .category-agent { background: #f59e0b; color: #0a0e17; }
        .category-engine { background: #ef4444; color: #fff; }
        .category-reasoning { background: #a78bfa; color: #0a0e17; }
        .category-data { background: #34d399; color: #0a0e17; }
        .category-infra { background: #22d3ee; color: #0a0e17; }
        .category-governance { background: #ec4899; color: #fff; }

        .line-default {
            stroke: #4a5568;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 5,5;
            opacity: 0.3;
        }

        .line-active {
            stroke-width: 3;
            opacity: 1;
            transition: all 0.3s;
        }

        .sidebar {
            width: 280px;
            background: #131a2b;
            border: 1px solid #1a2340;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-title {
            padding: 12px;
            border-bottom: 1px solid #1a2340;
            font-size: 12px;
            font-weight: 600;
            color: #d4a843;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .step-item {
            padding: 8px;
            margin-bottom: 8px;
            background: #1a2340;
            border-left: 3px solid #2d3a52;
            border-radius: 2px;
            font-size: 12px;
            line-height: 1.4;
        }

        .step-item.active {
            background: rgba(212, 168, 67, 0.1);
            border-left-color: #d4a843;
        }

        .step-number {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #d4a843;
            color: #0a0e17;
            border-radius: 50%;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            margin-right: 6px;
            line-height: 1.8;
        }

        .legend {
            padding: 12px;
            border-top: 1px solid #1a2340;
            max-height: 180px;
            overflow-y: auto;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .zoom-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #131a2b;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3a52;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d4a62;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .canvas-wrapper {
                flex: 2;
            }

            .sidebar {
                flex: 1;
            }
        }
    </style>
</head>

                    { id: 'badge-issued', description: 'Badge issued' },
                    { id: 'response', description: 'Return accreditation to agent' }
                ],
                color: '#ec4899'
            },
            'journal-flow': {
                name: '55-Day Journal',
                category: 'Product Flows',
                path: [
                    { id: 'human-user', description: 'User navigates to Journal page' },
                    { id: 'journal-page', description: 'Journal page loaded' },
                    { id: 'encryption', description: 'Client-side AES-256 encryption applied' },
                    { id: 'journal-entries', description: 'Journal entries stored in database' },
                    { id: 'journal-content-engine', description: 'Journal content engine: daily curriculum' },
                    { id: 'pwa-service-worker', description: 'PWA service worker enables offline access' },
                    { id: 'response', description: 'Journal UI with source citations' }
                ],
                color: '#22d3ee'
            },
            'support-agent': {
                name: 'Support Agent Pipeline',
                category: 'Agent Flows',
                path: [
                    { id: 'external-agent', description: 'Support ticket arrives' },
                    { id: 'support-inbox', description: 'Support inbox processes ticket' },
                    { id: 'ring-wrapper-before', description: 'Ring Wrapper BEFORE loads context' },
                    { id: 'support-agent', description: 'Support agent drafts response' },
                    { id: 'ring-wrapper-after', description: 'Ring Wrapper AFTER evaluates' },
                    { id: 'support-patterns', description: 'Support patterns analyzes response' },
                    { id: 'support-proactive', description: 'Support proactive checks escalation' },
                    { id: 'notification', description: 'Notification sent if escalation needed' },
                    { id: 'response', description: 'Response sent to user' }
                ],
                color: '#f59e0b'
            }
        };

        let currentFlow = null;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let showAllConnections = false;

        const canvas = document.getElementById('canvas');
        const svg = document.getElementById('connectionsSvg');
        const flowSelector = document.getElementById('flowSelector');
        const stepList = document.getElementById('stepList');
        const toggleAllBtn = document.getElementById('toggleAllConnections');
        const resetBtn = document.getElementById('resetView');
        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');

        // Initialize nodes
        function initializeNodes() {
            Object.entries(nodes).forEach(([id, node]) => {
                const el = document.createElement('div');
                el.className = `node category-${node.category}`;
                if (node.brainDerived) el.classList.add('brain-derived');
                if (node.wrapped) el.classList.add('wrapped');
                el.innerHTML = `
                    <div>${node.label}</div>
                    <div class="node-step"></div>
                `;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.dataset.nodeId = id;
                canvas.appendChild(el);
            });
        }

        // Draw connection lines
        function drawConnections() {
            svg.innerHTML = '';

            if (showAllConnections) {
                // Draw all possible connections (faintly)
                Object.entries(flows).forEach(([, flow]) => {
                    for (let i = 0; i < flow.path.length - 1; i++) {
                        const fromId = flow.path[i].id;
                        const toId = flow.path[i + 1].id;
                        drawLine(fromId, toId, '#4a5568', 2, true);
                    }
                });
            }

            // Draw active flow
            if (currentFlow) {
                const flow = flows[currentFlow];
                for (let i = 0; i < flow.path.length - 1; i++) {
                    const fromId = flow.path[i].id;
                    const toId = flow.path[i + 1].id;
                    drawLine(fromId, toId, flow.color, 3, false);
                }
            }
        }

        function drawLine(fromId, toId, color, width, dashed) {
            const fromNode = nodes[fromId];
            const toNode = nodes[toId];
            if (!fromNode || !toNode) return;

            const x1 = fromNode.x + 45;
            const y1 = fromNode.y + 20;
            const x2 = toNode.x + 45;
            const y2 = toNode.y + 20;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', width);
            if (dashed) line.setAttribute('stroke-dasharray', '5,5');
            line.setAttribute('opacity', dashed ? '0.3' : '1');
            svg.appendChild(line);

            // Draw arrowhead
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const arrowSize = 8;
            const arrowPoints = [
                [x2, y2],
                [x2 - arrowSize * Math.cos(angle - Math.PI / 6), y2 - arrowSize * Math.sin(angle - Math.PI / 6)],
                [x2 - arrowSize * Math.cos(angle + Math.PI / 6), y2 - arrowSize * Math.sin(angle + Math.PI / 6)]
            ];

            const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            arrow.setAttribute('points', arrowPoints.map(p => p.join(',')).join(' '));
            arrow.setAttribute('fill', color);
            arrow.setAttribute('opacity', dashed ? '0.3' : '1');
            svg.appendChild(arrow);
        }

        // Show flow
        function showFlow(flowId) {
            currentFlow = flowId;

            // Dim all nodes
            document.querySelectorAll('.node').forEach(el => {
                el.classList.add('dimmed');
                el.querySelector('.node-step').textContent = '';
            });

            stepList.innerHTML = '';

            if (!flowId) {
                // Reset view
                document.querySelectorAll('.node').forEach(el => el.classList.remove('dimmed'));
                drawConnections();
                return;
            }

            const flow = flows[flowId];
            if (!flow) return;

            // Highlight nodes in path
            flow.path.forEach((step, index) => {
                const nodeEl = document.querySelector(`[data-node-id="${step.id}"]`);
                if (nodeEl) {
                    nodeEl.classList.remove('dimmed');
                    nodeEl.classList.add('active');
                    nodeEl.querySelector('.node-step').textContent = index + 1;
                }
            });

            // Update step list
            flow.path.forEach((step, index) => {
                const stepEl = document.createElement('div');
                stepEl.className = 'step-item';
                stepEl.innerHTML = `<span class="step-number">${index + 1}</span><strong>${nodes[step.id].label}</strong><br><span style="color: #8b92a0; font-size: 11px;">${step.description}</span>`;
                stepList.appendChild(stepEl);
            });

            drawConnections();
        }

        // Pan and zoom
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
            canvas.classList.add('dragging');
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            panX += dx;
            panY += dy;
            dragStart = { x: e.clientX, y: e.clientY };
            updateTransform();
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.classList.remove('dragging');
        });

        zoomInBtn.addEventListener('click', () => {
            zoomLevel = Math.min(zoomLevel + 0.2, 3);
            updateTransform();
        });

        zoomOutBtn.addEventListener('click', () => {
            zoomLevel = Math.max(zoomLevel - 0.2, 0.5);
            updateTransform();
        });

        resetBtn.addEventListener('click', () => {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            updateTransform();
            flowSelector.value = '';
            showFlow(null);
        });

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            svg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            canvas.style.transformOrigin = '0 0';
            svg.style.transformOrigin = '0 0';
        }

        flowSelector.addEventListener('change', (e) => {
            showFlow(e.target.value);
        });

        toggleAllBtn.addEventListener('click', () => {
            showAllConnections = !showAllConnections;
            toggleAllBtn.classList.toggle('active');
            drawConnections();
        });

        // Initialize
        initializeNodes();
        drawConnections();
    </script>
</body>
</html>
