<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageReasoning Flow Tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            background: #0a0e17;
            color: #e4e9f1;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            background: #131a2b;
            border-bottom: 1px solid #1a2340;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .title-section {
            flex: 1;
            min-width: 300px;
        }

        .title-section h1 {
            font-size: 24px;
            font-weight: 600;
            color: #d4a843;
            margin-bottom: 4px;
        }

        .title-section p {
            font-size: 13px;
            color: #8b92a0;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 8px 12px;
            background: #1a2340;
            border: 1px solid #2d3a52;
            color: #e4e9f1;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        select:hover, button:hover {
            background: #252e42;
            border-color: #3d4a62;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #d4a843;
            box-shadow: 0 0 0 2px rgba(212, 168, 67, 0.1);
        }

        .control-label {
            font-size: 13px;
            color: #8b92a0;
        }

        .toggle-btn {
            padding: 8px 12px;
            background: #1a2340;
            border: 1px solid #2d3a52;
            color: #e4e9f1;
        }

        .toggle-btn.active {
            background: #d4a843;
            color: #0a0e17;
            border-color: #d4a843;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            gap: 16px;
            padding: 16px;
        }

        .canvas-wrapper {
            flex: 1;
            background: #0a0e17;
            border: 1px solid #1a2340;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            position: relative;
        }

        #canvas.dragging {
            cursor: grabbing;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .nodes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .node {
            position: absolute;
            padding: 8px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
        }

        .node.brain-derived {
            border: 2px solid #a78bfa;
        }

        .node.wrapped {
            border: 2px solid #f472b6;
        }

        .node.dimmed {
            opacity: 0.2;
        }

        .node.active {
            opacity: 1;
            box-shadow: 0 0 15px rgba(212, 168, 67, 0.6), 0 0 0 2px rgba(212, 168, 67, 0.3);
        }

        .node-step {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 24px;
            height: 24px;
            background: #d4a843;
            color: #0a0e17;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node.active .node-step {
            opacity: 1;
        }

        /* Category colors */
        .category-product { background: #60a5fa; color: #0a0e17; }
        .category-tool { background: #f472b6; color: #0a0e17; }
        .category-agent { background: #f59e0b; color: #0a0e17; }
        .category-engine { background: #ef4444; color: #fff; }
        .category-reasoning { background: #a78bfa; color: #0a0e17; }
        .category-data { background: #34d399; color: #0a0e17; }
        .category-infra { background: #22d3ee; color: #0a0e17; }
        .category-governance { background: #ec4899; color: #fff; }

        .line-default {
            stroke: #4a5568;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 5,5;
            opacity: 0.3;
        }

        .line-active {
            stroke-width: 3;
            opacity: 1;
            transition: all 0.3s;
        }

        .sidebar {
            width: 280px;
            background: #131a2b;
            border: 1px solid #1a2340;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-title {
            padding: 12px;
            border-bottom: 1px solid #1a2340;
            font-size: 12px;
            font-weight: 600;
            color: #d4a843;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .step-item {
            padding: 8px;
            margin-bottom: 8px;
            background: #1a2340;
            border-left: 3px solid #2d3a52;
            border-radius: 2px;
            font-size: 12px;
            line-height: 1.4;
        }

        .step-item.active {
            background: rgba(212, 168, 67, 0.1);
            border-left-color: #d4a843;
        }

        .step-number {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #d4a843;
            color: #0a0e17;
            border-radius: 50%;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            margin-right: 6px;
            line-height: 1.8;
        }

        .legend {
            padding: 12px;
            border-top: 1px solid #1a2340;
            max-height: 180px;
            overflow-y: auto;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .zoom-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #131a2b;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d3a52;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d4a62;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .canvas-wrapper {
                flex: 2;
            }

            .sidebar {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-section">
            <h1>SageReasoning Flow Tracer</h1>
            <p>Select a function to trace its path through the system</p>
        </div>
        <div class="controls">
            <label class="control-label">Flow:</label>
            <select id="flowSelector">
                <option value="">-- Select a flow --</option>
                <optgroup label="Brain-Derived Tools">
                    <option value="sage-reason">sage-reason (Standard depth)</option>
                    <option value="sage-score">sage-score</option>
                    <option value="sage-guard">sage-guard</option>
                    <option value="sage-decide">sage-decide (now wraps sage-reason)</option>
                    <option value="sage-filter">sage-filter (now wraps sage-reason)</option>
                    <option value="sage-converse">sage-converse (now wraps sage-reason deep)</option>
                    <option value="sage-audit">sage-audit</option>
                    <option value="sage-iterate">sage-iterate</option>
                    <option value="sage-reflect">sage-reflect</option>
                </optgroup>
                <optgroup label="Assessment Flows">
                    <option value="sage-profile">sage-profile (Full agent assessment)</option>
                    <option value="sage-diagnose">sage-diagnose</option>
                    <option value="baseline-assessment">Baseline Assessment</option>
                </optgroup>
                <optgroup label="Wrapped Skills (Revenue)">
                    <option value="wrapped-align">sage-align (Value Alignment)</option>
                    <option value="wrapped-classify">sage-classify (Decision Classifier)</option>
                    <option value="wrapped-coach">sage-coach (Coaching)</option>
                    <option value="wrapped-comply">sage-compliance (Compliance)</option>
                    <option value="wrapped-educate">sage-educate (Education)</option>
                    <option value="wrapped-govern">sage-govern (Governance)</option>
                    <option value="wrapped-identity">sage-identity (Role Analysis)</option>
                    <option value="wrapped-invest">sage-invest (Investment)</option>
                    <option value="wrapped-moderate">sage-moderate (Moderation)</option>
                    <option value="wrapped-negotiate">sage-negotiate (Negotiation)</option>
                    <option value="wrapped-pivot">sage-pivot (Strategic Pivot)</option>
                    <option value="wrapped-premortem">sage-premortem (Pre-Mortem)</option>
                    <option value="wrapped-prioritise">sage-prioritise (Prioritisation)</option>
                    <option value="wrapped-resolve">sage-resolve (Conflict Resolution)</option>
                    <option value="wrapped-retro">sage-retro (Retrospective)</option>
                </optgroup>
                <optgroup label="Agent Flows">
                    <option value="mentor-ring">Mentor Ring (BEFORE/AFTER)</option>
                    <option value="private-mentor">Private Mentor: Journal Interpretation</option>
                    <option value="trust-layer">Trust Layer: Agent Accreditation</option>
                    <option value="support-agent">Support Agent Pipeline</option>
                </optgroup>
                <optgroup label="Product Flows">
                    <option value="journal-flow">55-Day Journal</option>
                </optgroup>
            </select>
            <label class="control-label">
                <button id="toggleAllConnections" class="toggle-btn">All Lines</button>
            </label>
            <button id="resetView">Reset View</button>
        </div>
    </div>

    <div class="container">
        <div class="canvas-wrapper">
            <svg id="connectionsSvg"></svg>
            <div id="canvas" class="nodes-container"></div>
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomIn">+</button>
                <button class="zoom-btn" id="zoomOut">−</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-title">Flow Steps</div>
            <div class="step-list" id="stepList"></div>
            <div class="sidebar-title">Legend</div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #60a5fa;"></div>
                    <span>Product</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f472b6;"></div>
                    <span>Tool</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f59e0b;"></div>
                    <span>Agent</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ef4444;"></div>
                    <span>Engine</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #a78bfa;"></div>
                    <span>Reasoning</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #34d399;"></div>
                    <span>Data</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #22d3ee;"></div>
                    <span>Infrastructure</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ec4899;"></div>
                    <span>Governance</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="border: 2px solid #a78bfa; background: transparent;"></div>
                    <span>Brain-Derived</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="border: 2px solid #f472b6; background: transparent;"></div>
                    <span>Wrapped</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Node definitions with positions (arranged in logical layers)
        let nodes = {};

        // Flow definitions
        let flows = {};

        // Set of node IDs whose source-data component has a non-empty `blocker`.
        // Populated from /component-registry.json in loadFlowData().
        let blockedNodeIds = new Set();

        let currentFlow = null;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let showAllConnections = false;

        const canvas = document.getElementById('canvas');
        const svg = document.getElementById('connectionsSvg');
        const flowSelector = document.getElementById('flowSelector');
        const stepList = document.getElementById('stepList');
        const toggleAllBtn = document.getElementById('toggleAllConnections');
        const resetBtn = document.getElementById('resetView');
        const zoomInBtn = document.getElementById('zoomIn');
        const zoomOutBtn = document.getElementById('zoomOut');

        // Initialize nodes
        function initializeNodes() {
            Object.entries(nodes).forEach(([id, node]) => {
                const el = document.createElement('div');
                el.className = `node category-${node.category}`;
                if (node.brainDerived) el.classList.add('brain-derived');
                if (node.wrapped) el.classList.add('wrapped');
                // Apply red label text to nodes whose source-data component has a
                // non-empty `blocker` field. Inline style on the label element so
                // it does not affect layout, positioning, or the node container.
                const labelStyle = blockedNodeIds.has(id) ? ' style="color: red"' : '';
                el.innerHTML = `
                    <div${labelStyle}>${node.label}</div>
                    <div class="node-step"></div>
                `;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.dataset.nodeId = id;
                canvas.appendChild(el);
            });
        }

        // Compute the set of node IDs that correspond to a component-registry
        // entry with a non-empty `blocker` field. Source data: component-registry.json
        // (mirrors Capability_Inventory.html). Matching rules, in order:
        //   1. node.id === component.id
        //   2. node.id === component.id with common prefix stripped (agent-/engine-/...)
        //      — only when the stripped id is multi-word, to avoid over-matching
        //      generic tokens like "support"
        //   3. node.id starts with "<stripped-id>-" (multi-word stripped id only)
        //   4. node.label === component.name
        //   5. node.label is a word-boundary prefix of component.name (or vice versa)
        //      after stripping any parenthetical suffix from the component name
        //   6. explicit alias (for cases where names diverge, e.g. reasoning-journal-layers
        //      "Journal Interpretation" vs node label "Journal Interpreter")
        function computeBlockedNodeIds(nodesObj, components) {
            const blockedIds = new Set();
            const blockedShortIds = new Set();
            const blockedNames = new Set();
            const PREFIX_RE = /^(agent|engine|infra|reasoning|data|doc|product|tool|ops)-(.+)$/;
            components.forEach(c => {
                if (!c || typeof c.blocker !== 'string' || c.blocker.trim() === '') return;
                if (c.id) {
                    blockedIds.add(c.id);
                    const m = c.id.match(PREFIX_RE);
                    if (m && m[2].indexOf('-') !== -1) {
                        blockedShortIds.add(m[2]);
                    }
                }
                if (c.name) {
                    blockedNames.add(c.name);
                    const stripped = c.name.replace(/\s*\([^)]*\)\s*$/, '').trim();
                    if (stripped) blockedNames.add(stripped);
                }
            });
            // Explicit aliases: blocked component id -> node id
            const EXPLICIT_ALIASES = new Set([
                'journal-interpreter' // reasoning-journal-layers
            ]);
            const result = new Set();
            Object.entries(nodesObj).forEach(([nodeId, node]) => {
                if (blockedIds.has(nodeId)) { result.add(nodeId); return; }
                if (blockedShortIds.has(nodeId)) { result.add(nodeId); return; }
                for (const sid of blockedShortIds) {
                    if (nodeId.startsWith(sid + '-')) { result.add(nodeId); return; }
                }
                const label = node && node.label ? node.label : '';
                if (label && blockedNames.has(label)) { result.add(nodeId); return; }
                if (label) {
                    for (const name of blockedNames) {
                        if (name === label) continue;
                        if (name.startsWith(label + ' ') || label.startsWith(name + ' ')) {
                            result.add(nodeId); return;
                        }
                    }
                }
                if (EXPLICIT_ALIASES.has(nodeId)) { result.add(nodeId); return; }
            });
            return result;
        }

        // Draw connection lines
        function drawConnections() {
            svg.innerHTML = '';

            if (showAllConnections) {
                // Draw all possible connections (faintly)
                Object.entries(flows).forEach(([, flow]) => {
                    for (let i = 0; i < flow.path.length - 1; i++) {
                        const fromId = flow.path[i].id;
                        const toId = flow.path[i + 1].id;
                        drawLine(fromId, toId, '#4a5568', 2, true);
                    }
                });
            }

            // Draw active flow
            if (currentFlow) {
                const flow = flows[currentFlow];
                for (let i = 0; i < flow.path.length - 1; i++) {
                    const fromId = flow.path[i].id;
                    const toId = flow.path[i + 1].id;
                    drawLine(fromId, toId, flow.color, 3, false);
                }
            }
        }

        function drawLine(fromId, toId, color, width, dashed) {
            const fromNode = nodes[fromId];
            const toNode = nodes[toId];
            if (!fromNode || !toNode) return;

            const x1 = fromNode.x + 45;
            const y1 = fromNode.y + 20;
            const x2 = toNode.x + 45;
            const y2 = toNode.y + 20;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', width);
            if (dashed) line.setAttribute('stroke-dasharray', '5,5');
            line.setAttribute('opacity', dashed ? '0.3' : '1');
            svg.appendChild(line);

            // Draw arrowhead
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const arrowSize = 8;
            const arrowPoints = [
                [x2, y2],
                [x2 - arrowSize * Math.cos(angle - Math.PI / 6), y2 - arrowSize * Math.sin(angle - Math.PI / 6)],
                [x2 - arrowSize * Math.cos(angle + Math.PI / 6), y2 - arrowSize * Math.sin(angle + Math.PI / 6)]
            ];

            const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            arrow.setAttribute('points', arrowPoints.map(p => p.join(',')).join(' '));
            arrow.setAttribute('fill', color);
            arrow.setAttribute('opacity', dashed ? '0.3' : '1');
            svg.appendChild(arrow);
        }

        // Show flow
        function showFlow(flowId) {
            currentFlow = flowId;

            // Dim all nodes
            document.querySelectorAll('.node').forEach(el => {
                el.classList.add('dimmed');
                el.querySelector('.node-step').textContent = '';
            });

            stepList.innerHTML = '';

            if (!flowId) {
                // Reset view
                document.querySelectorAll('.node').forEach(el => el.classList.remove('dimmed'));
                drawConnections();
                return;
            }

            const flow = flows[flowId];
            if (!flow) return;

            // Highlight nodes in path
            flow.path.forEach((step, index) => {
                const nodeEl = document.querySelector(`[data-node-id="${step.id}"]`);
                if (nodeEl) {
                    nodeEl.classList.remove('dimmed');
                    nodeEl.classList.add('active');
                    nodeEl.querySelector('.node-step').textContent = index + 1;
                }
            });

            // Update step list
            flow.path.forEach((step, index) => {
                const stepEl = document.createElement('div');
                stepEl.className = 'step-item';
                stepEl.innerHTML = `<span class="step-number">${index + 1}</span><strong>${nodes[step.id].label}</strong><br><span style="color: #8b92a0; font-size: 11px;">${step.description}</span>`;
                stepList.appendChild(stepEl);
            });

            drawConnections();
        }

        // Pan and zoom
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
            canvas.classList.add('dragging');
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            panX += dx;
            panY += dy;
            dragStart = { x: e.clientX, y: e.clientY };
            updateTransform();
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.classList.remove('dragging');
        });

        zoomInBtn.addEventListener('click', () => {
            zoomLevel = Math.min(zoomLevel + 0.2, 3);
            updateTransform();
        });

        zoomOutBtn.addEventListener('click', () => {
            zoomLevel = Math.max(zoomLevel - 0.2, 0.5);
            updateTransform();
        });

        resetBtn.addEventListener('click', () => {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            updateTransform();
            flowSelector.value = '';
            showFlow(null);
        });

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            svg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            canvas.style.transformOrigin = '0 0';
            svg.style.transformOrigin = '0 0';
        }

        flowSelector.addEventListener('change', (e) => {
            showFlow(e.target.value);
        });

        toggleAllBtn.addEventListener('click', () => {
            showAllConnections = !showAllConnections;
            toggleAllBtn.classList.toggle('active');
            drawConnections();
        });

        // Initialize — fetch flow data from /flows.json, then render.
        // Mirrors the pattern used by SageReasoning_Capability_Inventory.html
        // which fetches /component-registry.json. See Task 1 (2026-04-21).
        async function loadFlowData() {
            try {
                const response = await fetch('/flows.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                nodes = data.nodes;
                flows = data.flows;

                // Also fetch the component registry so we can mark blocked
                // components' labels in red. Registry load is non-fatal —
                // if it fails, the map still renders, just without red markers.
                try {
                    const regRes = await fetch('/component-registry.json');
                    if (regRes.ok) {
                        const registry = await regRes.json();
                        const components = Array.isArray(registry) ? registry : (registry.components || []);
                        blockedNodeIds = computeBlockedNodeIds(nodes, components);
                    }
                } catch (regErr) {
                    console.warn('Component registry failed to load; blocker markers will not be applied.', regErr);
                }

                initializeNodes();
                drawConnections();
            } catch (err) {
                console.error('Failed to load /flows.json:', err);
                // Inline error message. Does not depend on external CSS.
                const banner = document.createElement('div');
                banner.style.cssText = 'position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:10px 16px;border-radius:6px;font-family:sans-serif;font-size:13px;z-index:9999;';
                banner.textContent = 'Flow data failed to load (' + err.message + '). Check that /flows.json is deployed alongside this page.';
                document.body.appendChild(banner);
            }
        }
        loadFlowData();
    </script>
</body>
</html>
