<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Stoic path begins</title>
</head>
<!--
  SageReasoning Welcome Email — v2 (research-based redesign)

  Design principles applied:
  - Near-plain-text format (better deliverability, 60%+ open rate target)
  - Single CTA only (reduces decision fatigue)
  - Under 80 words of body copy
  - Short subject line: "Your Stoic path begins" (5 words)
  - Zeus + ancient advice* footer (brand consistency)
  - Educational content moved to Day 3 nurture email
-->
<body style="margin:0;padding:0;background:#ACC4B2;font-family:Georgia,'Times New Roman',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#ACC4B2;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;border:1px solid #d4dcc8;overflow:hidden;max-width:560px;width:100%;">

          <!-- Minimal header — wordmark only -->
          <tr>
            <td style="padding:28px 40px 20px;text-align:center;border-bottom:1px solid #e8ede4;">
              <span style="font-size:22px;font-weight:400;color:#4d6040;font-style:italic;letter-spacing:0.3px;">sagereasoning</span>
            </td>
          </tr>

          <!-- Body — short, single CTA -->
          <tr>
            <td style="padding:32px 40px 28px;text-align:center;">
              <p style="margin:0 0 18px;font-size:18px;font-weight:400;color:#2e3d26;">
                Welcome. Your account is confirmed.
              </p>
              <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#4a5740;">
                Here are 5 questions you can't get wrong.
              </p>

              <!-- Single CTA button -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:8px;">
                <tr>
                  <td align="center">
                    <a href="https://www.sagereasoning.com/baseline"
                       style="display:inline-block;padding:14px 40px;background:#4d6040;color:#ffffff;text-decoration:none;font-size:16px;font-family:Georgia,serif;border-radius:6px;letter-spacing:0.3px;">
                      Get your baseline Stoic Score
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px 28px;border-top:1px solid #e8ede4;text-align:center;">
              <p style="margin:0;font-size:12px;color:#8a9a84;line-height:1.5;">
                You signed up at <a href="https://www.sagereasoning.com" style="color:#4d6040;text-decoration:none;">sagereasoning.com</a>.
                If this was not you, ignore this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
